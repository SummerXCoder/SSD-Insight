# ============================================================
# nginx.conf for Meeting Room Reservation System (Frontend)
# SPA 路由回退 + 静态资源缓存策略
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源缓存：Vite 构建产物中带 hash 的文件长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA 路由回退：所有未匹配的路径返回 index.html，由 Vue Router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
